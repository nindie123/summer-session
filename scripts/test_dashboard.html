<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8患者体征实时监控</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#0d1117;padding:16px;color:#e6edf3}
h1{text-align:center;font-size:16px;color:#e6edf3;margin-bottom:4px}
.sub{text-align:center;font-size:11px;color:#8b949e;margin-bottom:12px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:1500px;margin:0 auto}
.card{background:#161b22;border-radius:8px;padding:10px;border:1px solid #30363d}
.card.WARNING{border-color:#d29922;box-shadow:0 0 8px rgba(210,153,34,0.3)}
.card.CRITICAL{border-color:#da3633;box-shadow:0 0 8px rgba(218,54,51,0.4)}
.card.EMERGENCY{border-color:#da3633;box-shadow:0 0 12px rgba(218,54,51,0.6)}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.pid{font-size:13px;font-weight:bold;color:#e6edf3}
.scene{font-size:10px;color:#8b949e}
.mews{font-size:14px;font-weight:bold;margin:2px 0}
.mews.safe{color:#3fb950}.mews.warn{color:#d29922}.mews.danger{color:#da3633}
.tag{font-size:10px;padding:1px 6px;border-radius:6px;margin-left:4px}
.tag.STABLE{background:#1a3a1a;color:#3fb950;border:1px solid #3fb950}
.tag.WARNING{background:#3a2e1a;color:#d29922;border:1px solid #d29922}
.tag.CRITICAL{background:#3a1a1a;color:#da3633;border:1px solid #da3633}
.tag.EMERGENCY{background:#3a1a1a;color:#ff6b6b;border:1px solid #ff6b6b}
.vitals{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-top:6px}
.item{text-align:center;padding:4px 2px;border-radius:4px;background:#0d1117}
.item .val{font-size:15px;font-weight:bold;display:block}
.item .lbl{font-size:9px;color:#8b949e;display:block;margin-top:1px}
.item.hr .val{color:#ff7b72}
.item.bp .val{color:#d29922}
.item.spo2 .val{color:#3fb950}
.item.rr .val{color:#58a6ff}
.item.temp .val{color:#bc8cff}
.time{font-size:9px;color:#484f58;margin-top:4px;text-align:right}
.legend{text-align:center;font-size:11px;color:#8b949e;margin-bottom:10px}
.legend span{margin:0 8px}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:2px}
@media(max-width:1000px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<h1>8 患者体征实时监控</h1>
<div class="sub"><span id="ts"></span> &middot; 每5秒自动刷新</div>
<div class="legend">
  <span><span class="dot" style="background:#ff7b72"></span>HR 心率</span>
  <span><span class="dot" style="background:#d29922"></span>BP 血压</span>
  <span><span class="dot" style="background:#3fb950"></span>SpO2 血氧</span>
  <span><span class="dot" style="background:#58a6ff"></span>RR 呼吸</span>
  <span><span class="dot" style="background:#bc8cff"></span>TEMP 体温</span>
</div>
<div class="grid" id="grid"><div style="grid-column:1/-1;text-align:center;padding:40px;color:#484f58">加载中...</div></div>

<script>
const PATIENTS = [
  {id:"P001",scene:"健康"},{id:"P002",scene:"高血压"},{id:"P003",scene:"心动过速"},{id:"P004",scene:"心动过缓"},
  {id:"P005",scene:"低血氧"},{id:"P006",scene:"发热"},{id:"P007",scene:"恶化"},{id:"P008",scene:"重症"},
];

async function refresh() {
  document.getElementById('ts').textContent = '更新时间: ' + new Date().toLocaleTimeString();
  const grid = document.getElementById('grid');
  let html = '';

  for (const p of PATIENTS) {
    // 取最新体征
    let hr='--', sbp='--', dbp='--', spo2='--', rr='--', temp='--';
    let mews='?', risk='--', ts='';
    try {
      const r = await fetch(`/api/v1/patients/${p.id}/vitals?limit=10`);
      const d = await r.json();
      if (d.code===200 && d.data.points.length>0) {
        // 按时间正序遍历（旧的在前新的在后），只取每个参数第一次出现的值（即最新值）
        const pts = d.data.points.reverse(); // 改为从旧到新遍历
        for (const pt of pts) {
          if (pt.heartRate !== undefined && hr === '--') hr = pt.heartRate;
          if (pt.sysBP !== undefined && sbp === '--') { sbp = pt.sysBP; dbp = pt.diaBP ?? dbp; }
          if (pt.spo2 !== undefined && spo2 === '--') spo2 = pt.spo2;
          if (pt.respiratoryRate !== undefined && rr === '--') rr = pt.respiratoryRate;
          if (pt.temperature !== undefined && temp === '--') temp = pt.temperature;
          if (pt.timestamp) ts = pt.timestamp;
        }
      }
    } catch(e){}

    // 取最新MEWS
    try {
      const r = await fetch(`/api/v1/patients/${p.id}/mews?limit=1`);
      const d = await r.json();
      if (d.code===200 && d.data.points.length>0) {
        const m = d.data.points[d.data.points.length-1];
        mews = m.totalScore; risk = m.riskLevel;
      }
    } catch(e){}

    const cls = risk==='CRITICAL'||risk==='EMERGENCY'?'CRITICAL':risk==='WARNING'?'WARNING':'';
    const ms = mews>=6?'danger':mews>=4?'warn':'safe';
    const tsStr = ts ? new Date(ts).toLocaleTimeString() : '--';

    html += `<div class="card ${cls}">
      <div class="header">
        <div><span class="pid">${p.id}</span> <span class="scene">${p.scene}</span></div>
        <div><span class="mews ${ms}">MEWS ${mews}</span><span class="tag ${risk}">${risk}</span></div>
      </div>
      <div class="vitals">
        <div class="item hr"><span class="val">${hr}</span><span class="lbl">/min</span></div>
        <div class="item bp"><span class="val">${sbp}${sbp!=='--'?'/'.concat(dbp):''}</span><span class="lbl">mmHg</span></div>
        <div class="item spo2"><span class="val">${spo2}</span><span class="lbl">%</span></div>
        <div class="item rr"><span class="val">${rr}</span><span class="lbl">/min</span></div>
        <div class="item temp"><span class="val">${temp}</span><span class="lbl">°C</span></div>
      </div>
      <div class="time">${tsStr}</div>
    </div>`;
  }
  grid.innerHTML = html;
}

refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
