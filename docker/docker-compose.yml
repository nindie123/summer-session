services:

  # ── 基础设施 ──────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: echo stat | nc localhost 2181
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # 容器内用主机名 kafka:9092，容器外用 localhost:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: kafka-topics --bootstrap-server kafka:9092 --list
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: >
      bash -c "
        echo 'Creating topics...'
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic standardized.vitals --partitions 4 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic ai.diagnostic.input --partitions 4 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic ai.alerts --partitions 2 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic device.status --partitions 2 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic dead.letter.queue --partitions 2 --replication-factor 1
        echo 'Topics created.'
      "

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 3s
      retries: 5

  influxdb:
    image: influxdb:2.7
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: admin123456
      DOCKER_INFLUXDB_INIT_ORG: hospital
      DOCKER_INFLUXDB_INIT_BUCKET: vitals
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: admin-token
    volumes:
      - influxdb-data:/var/lib/influxdb2
    healthcheck:
      test: influx ping
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 采集层 ────────────────────────────────────────
  collector:
    build:
      context: ..
      dockerfile: docker/collector.Dockerfile
    ports:
      - "9001:9001"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    restart: unless-stopped

  # ── 设备模拟器 ──────────────────────────────────
  device-simulator:
    build:
      context: ..
      dockerfile: docker/simulator.Dockerfile
    depends_on:
      collector:
        condition: service_started
    environment:
      COLLECTOR_HOST: collector
      COLLECTOR_PORT: 9001
    restart: "no"

  # ── HBase ──────────────────────────────────────────
  hbase:
    image: harisekhon/hbase:2.0
    ports:
      - "16010:16010"  # Master Web UI
      - "9090:9090"    # Thrift API（AI 通过此端口读取）
    environment:
      HBASE_MANAGES_ZK: "true"
    healthcheck:
      test: bash -c 'echo "list" | hbase shell -n 2>/dev/null | head -1 || exit 1'
      interval: 20s
      timeout: 15s
      retries: 15
      start_period: 60s

  hbase-init:
    image: harisekhon/hbase:2.0
    depends_on:
      hbase:
        condition: service_healthy
    entrypoint: >
      bash -c "
        echo 'Creating tables...'
        echo '
          create \"vitals\", {NAME=>\"v\", VERSIONS=>1, TTL=>2592000}, {NAME=>\"m\", VERSIONS=>1}, {NAME=>\"d\", VERSIONS=>1}
          create \"alerts\", {NAME=>\"a\", VERSIONS=>1, TTL=>7776000}
          list
        ' | hbase shell -n
        echo 'HBase tables created.'
      "

  # ── API 网关 ────────────────────────────────────
  api-gateway:
    build:
      context: ..
      dockerfile: docker/api-gateway.Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: admin-token
      INFLUXDB_ORG: hospital
      INFLUXDB_BUCKET: vitals
    restart: unless-stopped

  # ── Flink 实时计算层 ────────────────────────────
  jobmanager:
    image: docker-flink-job:latest
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=jobmanager
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=admin-token
      - INFLUXDB_ORG=hospital
      - INFLUXDB_BUCKET=vitals
      - HBASE_ZOOKEEPER_QUORUM=hbase
      - HBASE_ZOOKEEPER_PORT=2181
    depends_on:
      kafka:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      hbase:
        condition: service_started
    restart: unless-stopped

  taskmanager:
    image: flink:1.19-java17
    command: taskmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=jobmanager
      - TASK_MANAGER_NUMBER_OF_TASK_SLOTS=4
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=admin-token
      - INFLUXDB_ORG=hospital
      - INFLUXDB_BUCKET=vitals
      - HBASE_ZOOKEEPER_QUORUM=hbase
      - HBASE_ZOOKEEPER_PORT=2181
    depends_on:
      - jobmanager
    restart: unless-stopped

  flink-job:
    build:
      context: ..
      dockerfile: docker/flink.Dockerfile
    depends_on:
      - jobmanager
      - hbase
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: admin-token
      INFLUXDB_ORG: hospital
      INFLUXDB_BUCKET: vitals
      HBASE_ZOOKEEPER_QUORUM: hbase
      HBASE_ZOOKEEPER_PORT: "2181"
    restart: "no"

volumes:
  influxdb-data:
  hbase-data:
